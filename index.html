<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas Hobby Consolas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Notas Hobby Consolas 1991 - 1996</h1>
		
		<div class="creditos-autor">
            <p>Web site creado por <strong>Señor Mayor</strong> | 
               <a href="https://twitter.com/senyor_mayor" target="_blank" rel="noopener noreferrer">X (Twitter)</a> -

            </p>
            <p class="texto-legal">
                <em>Este sitio web es únicamente para fines de consulta. No poseo los derechos de autor de las revistas ni de los juegos mostrados.</em>
            </p>
        </div>
        
        <div class="search-container">
			<input type="text" id="search-input" placeholder="Buscar juego, consola, desarrollador...">
				<button id="search-button">Buscar</button>
				<button id="reset-button">Reiniciar</button>
		</div>

        <p>
  			<font color="white">
    			<strong><span id="contador-juegos">0</span></strong>
  			</font>
		</p>

        <div class="table-container">
            <table id="tabla-juegos">
                <thead>
                    <tr>
                        <th data-column="Juego">Juego</th>
                        <th data-column="Consola">Consola</th>
                        <th data-column="Marca consola">Marca consola</th>
                        <th data-column="Desarrollador">Desarrollador</th>
                        <th data-column="Número">Número</th>
                        <th data-column="Mes">Mes</th>
                        <th data-column="Año">Año</th>
                        <th data-column="Pag">Página</th>
                        <th data-column="Nota" class="col-nota">Nota</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
